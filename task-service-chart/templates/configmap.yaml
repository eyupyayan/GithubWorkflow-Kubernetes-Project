apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "task-service.fullname" . }}-config
  labels:
    {{- include "task-service.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_ENV: {{ .Values.config.appEnv | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}