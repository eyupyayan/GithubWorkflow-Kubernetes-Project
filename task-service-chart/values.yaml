replicaCount: 1

image:
  repository: eyupyayan/task-service
  tag: v1
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

config:
  appName: task-service
  appEnv: base
  logLevel: INFO

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

nameOverride: ""
fullnameOverride: ""